name: Daily Supermarket Price Update

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update-firebase:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get your Python script from the repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3: Install the libraries your script needs
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests firebase-admin pyarrow fastparquet

      # Step 4: Securely create your Firebase key file from GitHub Secrets
      - name: Create Firebase Key JSON
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: echo $FIREBASE_KEY > firebase_admin_key.json

      # Step 5: Run your exact script!
      - name: Run ETL Script
        run: python update_prices.py